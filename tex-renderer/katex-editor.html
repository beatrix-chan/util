<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Math Renderer</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            transition: background-color .3s, color .3s;
        }

        #output {
            min-height: 150px;
            border: 1px solid var(--bs-border-color);
            border-radius: .5rem;
            padding: 1rem;
            background: var(--bs-body-bg);
        }
    </style>
</head>

<body class="p-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Math Renderer</h2>
            <button id="themeToggle" class="btn btn-secondary">Toggle Light/Dark</button>
        </div>

        <div class="mb-3">
            <label for="input" class="form-label">Enter LaTeX:</label>
            <textarea id="input" class="form-control" rows="4" placeholder="Example: $\int_0^1 x^2 dx$"></textarea>
        </div>

        <button id="renderBtn" class="btn btn-primary mb-3 focus-ring">Render</button>

        <h4>Output:</h4>
        <div id="output"></div>

        <div class="text-center fixed-bottom bg-secondary-subtle p-1">
            <div>Made with <a href="http://getbootstrap.com/">Bootstrap</a> and <a
                    href="https://katex.org/">KaTex</a></div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const renderBtn = document.getElementById("renderBtn");
        const input = document.getElementById("input");
        const output = document.getElementById("output");
        const themeToggle = document.getElementById("themeToggle");
        const html = document.documentElement;

        renderBtn.addEventListener("click", () => {
            output.innerHTML = input.value;
            renderMathInElement(output, {
                delimiters: [
                    { left: "$$", right: "$$", display: true },
                    { left: "$", right: "$", display: false }
                ]
            });
        });

        themeToggle.addEventListener("click", () => {
            const current = html.getAttribute("data-bs-theme");
            const next = current === "light" ? "dark" : "light";
            html.setAttribute("data-bs-theme", next);
        });
    </script>
</body>

</html>
