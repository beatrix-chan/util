<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TeX Renderer | MathJax</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [
          ["$", "$"],
          ["\\(", "\\)"],
        ],
      },
      svg: { fontCache: "global" },
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4.1.1/tex-svg.js"></script>

  <style>
    body {
      transition:
        background-color 0.3s,
        color 0.3s;
    }

    #output {
      min-height: 150px;
      border: 1px solid var(--bs-border-color);
      border-radius: 0.5rem;
      padding: 1rem;
      background: var(--bs-body-bg);
    }
  </style>
</head>

<body class="p-4">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Math Renderer | MathJax</h2>
      <button id="themeToggle" class="btn btn-secondary">
        Toggle Light/Dark
      </button>
    </div>

    <div class="mb-3">
      <label for="input" class="form-label">Enter LaTeX:</label>
      <textarea id="input" class="form-control" rows="4" placeholder="Example: $\int_0^1 x^2 dx$"></textarea>
    </div>
    <div class="alert alert-info mb-3">Remember to add enclose your equation with <code>$</code> for it to render correctly</div>
    <button id="renderBtn" class="btn btn-primary mb-3 focus-ring">Render</button>

    <h4>Output:</h4>
    <div id="output"></div>

    <div class="text-center fixed-bottom bg-secondary-subtle p-1">
      <div>Made with <a href="http://getbootstrap.com/">Bootstrap</a> and <a href="https://www.mathjax.org/">MathJax</a></div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

  <script>
    const renderBtn = document.getElementById("renderBtn");
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const themeToggle = document.getElementById("themeToggle");
    const html = document.documentElement;

    renderBtn.addEventListener("click", () => {
      output.innerHTML = input.value;
      MathJax.typesetPromise();
    });

    themeToggle.addEventListener("click", () => {
      const current = html.getAttribute("data-bs-theme");
      const next = current === "light" ? "dark" : "light";
      html.setAttribute("data-bs-theme", next);
    });
  </script>
</body>


</html>
